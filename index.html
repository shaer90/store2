<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NOIR" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg" />
  <title>NOIR — Fashion Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-web.css" />
</head>
<body dir="rtl">
  <!-- Splash -->
  <div class="splash" id="splash">
    <div class="mark">N<span class="dot"></span></div>
    <div class="loader"></div>
    <div class="tag">FW26 · Loading the drop</div>
  </div>

  <div id="root"></div>

  <!-- Capture PWA install prompt before React loads -->
  <script>
    window.__installPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__installPrompt = e;
    });
    window.addEventListener('appinstalled', function() {
      window.__installPrompt = null;
    });
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data -->
  <script src="data.js"></script>
  <script src="api.js"></script>

  <!-- Components -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages-shop.jsx"></script>
  <script type="text/babel" src="pages-account.jsx"></script>
  <script type="text/babel" src="web-shell.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
